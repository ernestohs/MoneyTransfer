spring.application.name=MoneyTransfer
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:moneytransfer;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
management.endpoints.web.exposure.include=health,metrics,prometheus
moneytransfer.security.allow-anonymous=${ALLOW_ANONYMOUS:true}
moneytransfer.transfer.min-amount=0.01
moneytransfer.transfer.max-amount=100000.00
moneytransfer.webhooks.signing-secret=${WEBHOOK_SIGNING_SECRET:dev-webhook-secret}
