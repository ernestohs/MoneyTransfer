name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release artifact
        run: ./gradlew clean test bootJar --no-daemon

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(date -u +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" build/libs/*.jar \
            --target "$GITHUB_SHA" \
            --title "Release $TAG" \
            --notes "Automated release for commit $GITHUB_SHA."

